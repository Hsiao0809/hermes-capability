name: Monitor TP/SL (每 5 分鐘)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run monitor
        run: python3 monitor.py
      - name: Run summary
        run: python3 summary.py
      - name: Commit and push
        run: |
          git config user.name "Hermes Bot"
          git config user.email "hermes@bot.local"
          git add data/ paper_trades.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🔄 auto: monitor check $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
